name: Firestore Monitor

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Restore cache (état précédent)
        uses: actions/cache@v4
        with:
          path: firestore_state.json
          key: firestore-state-${{ github.run_id }}
          restore-keys: |
            firestore-state-

      - name: Run monitor
        env:
          PASSPASS_EMAIL: ${{ secrets.PASSPASS_EMAIL }}
          PASSPASS_PASSWORD: ${{ secrets.PASSPASS_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: node monitor.js

      - name: Save cache
        uses: actions/cache@v4
        with:
          path: firestore_state.json
          key: firestore-state-${{ github.run_id }}
