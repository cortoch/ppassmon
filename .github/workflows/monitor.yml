name: Guesty Monitor

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-npm
        with:
          path: node_modules
          key: node-${{ hashFiles('package.json') }}

      - name: Install Node dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm install

      - name: Restore state
        uses: actions/cache@v4
        with:
          path: state.json
          key: guesty-state-${{ github.run_id }}
          restore-keys: |
            guesty-state-

      - name: Run monitor
        env:
          GUESTY_EMAIL: ${{ secrets.GUESTY_EMAIL }}
          GUESTY_PASSWORD: ${{ secrets.GUESTY_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: node index.js

      - name: Save state
        if: always()
        uses: actions/cache@v4
        with:
          path: state.json
          key: guesty-state-${{ github.run_id }}
