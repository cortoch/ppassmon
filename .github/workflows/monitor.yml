name: Passpass Monitor

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Chrome and Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb google-chrome-stable

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-npm
        with:
          path: node_modules
          key: node-${{ hashFiles('package.json') }}

      - name: Install Node dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm install

      - name: Restore state
        uses: actions/cache@v4
        with:
          path: state.json
          key: passpass-state-${{ github.run_id }}
          restore-keys: |
            passpass-state-

      - name: Run monitor
        env:
          PASSPASS_EMAIL: ${{ secrets.PASSPASS_EMAIL }}
          PASSPASS_PASSWORD: ${{ secrets.PASSPASS_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          DISPLAY: ':99'
        run: |
          Xvfb :99 -screen 0 1280x800x24 &
          sleep 2
          node index.js

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: "*.png"

      - name: Save state
        if: always()
        uses: actions/cache@v4
        with:
          path: state.json
          key: passpass-state-${{ github.run_id }}
