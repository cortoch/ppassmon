name: Passpass Monitor

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Xvfb
        run: sudo apt-get install -y xvfb

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-npm
        with:
          path: |
            node_modules
            ~/.cache/puppeteer
          key: node-puppeteer-${{ hashFiles('package.json') }}

      - name: Install dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: |
          npm install
          npx puppeteer browsers install chrome

      - name: Restore state
        uses: actions/cache@v4
        with:
          path: state.json
          key: passpass-state-${{ github.run_id }}
          restore-keys: |
            passpass-state-

      - name: Run monitor
        env:
          PASSPASS_EMAIL: ${{ secrets.PASSPASS_EMAIL }}
          PASSPASS_PASSWORD: ${{ secrets.PASSPASS_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          DISPLAY: ':99'
        run: |
          Xvfb :99 -screen 0 1280x800x24 &
          sleep 2
          node index.js

      - name: Save state
        if: always()
        uses: actions/cache@v4
        with:
          path: state.json
          key: passpass-state-${{ github.run_id }}
