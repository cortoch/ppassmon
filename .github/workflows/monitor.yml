name: Passpass Monitor

on:
  schedule:
    - cron: '*/30 * * * *'  # Toutes les 30 minutes
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install system dependencies (Chrome + Xvfb)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          npx puppeteer browsers install chrome

      - name: Install Node dependencies
        run: npm install

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: state.json
          key: passpass-state-${{ github.run_id }}
          restore-keys: |
            passpass-state-

      - name: Run monitor with virtual display
        env:
          PASSPASS_EMAIL: ${{ secrets.PASSPASS_EMAIL }}
          PASSPASS_PASSWORD: ${{ secrets.PASSPASS_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          DISPLAY: ':99'
        run: |
          Xvfb :99 -screen 0 1280x800x24 &
          sleep 2
          node index.js

      - name: Save state cache
        if: always()
        uses: actions/cache@v4
        with:
          path: state.json
          key: passpass-state-${{ github.run_id }}
